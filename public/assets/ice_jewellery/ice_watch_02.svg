<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FCFAF7" />
      <stop offset="100%" stop-color="#E8E2D5" />
    </radialGradient>

    <!-- Gold Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F5E8" />
      <stop offset="30%" stop-color="#DFBA6B" />
      <stop offset="70%" stop-color="#C510D7" stop-opacity="0" /> <!-- Fallback stops below -->
    </linearGradient>
    
    <linearGradient id="realGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2E3C6" />
      <stop offset="35%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#5A3F02" />
    </linearGradient>

    <linearGradient id="goldMesh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="50%" stop-color="#F2E3C6" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>

    <!-- Dark Accents -->
    <linearGradient id="steelDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D2D2D" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#5C4D37" flood-opacity="0.18" />
    </filter>
    <filter id="watchShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <!-- Pattern for Mesh Strap -->
    <pattern id="meshPattern" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 0,2 L 4,2 M 2,0 L 2,4" stroke="#AA7C11" stroke-width="0.5" opacity="0.4" />
      <path d="M 0,0 L 4,4 M 4,0 L 0,4" stroke="#F2E3C6" stroke-width="0.5" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bgGrad)" />

  <!-- Soft ambient shadow under the watch -->
  <ellipse cx="200" cy="185" rx="110" ry="15" fill="#5C4D37" opacity="0.12" filter="blur(8px)" />

  <g filter="url(#watchShadow)">
    <!-- Watch Straps (Upper and Lower) -->
    <!-- Lower Strap -->
    <path d="M 182,120 L 182,210 C 182,215 186,218 190,220 L 210,220 C 214,218 218,215 218,210 L 218,120 Z" fill="url(#goldMesh)" />
    <path d="M 182,120 L 182,210 C 182,215 186,218 190,220 L 210,220 C 214,218 218,215 218,210 L 218,120 Z" fill="url(#meshPattern)" />
    <!-- Lower Strap Gold Border Lines -->
    <line x1="182" y1="120" x2="182" y2="210" stroke="url(#realGold)" stroke-width="1.5" />
    <line x1="218" y1="120" x2="218" y2="210" stroke="url(#realGold)" stroke-width="1.5" />

    <!-- Upper Strap -->
    <path d="M 182,120 L 182,30 C 182,25 186,22 190,20 L 210,20 C 214,22 218,25 218,30 L 218,120 Z" fill="url(#goldMesh)" />
    <path d="M 182,120 L 182,30 C 182,25 186,22 190,20 L 210,20 C 214,22 218,25 218,30 L 218,120 Z" fill="url(#meshPattern)" />
    <!-- Upper Strap Gold Border Lines -->
    <line x1="182" y1="30" x2="182" y2="120" stroke="url(#realGold)" stroke-width="1.5" />
    <line x1="218" y1="30" x2="218" y2="120" stroke="url(#realGold)" stroke-width="1.5" />

    <!-- Watch Case Outer Ring -->
    <circle cx="200" cy="120" r="54" fill="url(#realGold)" />
    
    <!-- Watch Case Middle Ring (Shadowed bevel) -->
    <circle cx="200" cy="120" r="50" fill="url(#steelDark)" />
    <circle cx="200" cy="120" r="48" fill="url(#realGold)" />
    
    <!-- Watch Dial (Face) -->
    <circle cx="200" cy="120" r="44" fill="#FFFFFF" />
    <circle cx="200" cy="120" r="44" fill="url(#bgGrad)" opacity="0.3" />

    <!-- Dial Details: Brand Name -->
    <text x="200" y="98" font-family="'Cormorant Garamond', 'Playfair Display', serif" font-size="6.5" font-weight="700" fill="#8C6B23" letter-spacing="1.5" text-anchor="middle">ICE JEWELLERY</text>
    
    <!-- Hour Markers (Minimalist Gold Ticks) -->
    <!-- 12 -->
    <rect x="199" y="80" width="2" height="6" rx="0.5" fill="url(#realGold)" />
    <!-- 3 -->
    <rect x="234" y="119" width="6" height="2" rx="0.5" fill="url(#realGold)" />
    <!-- 6 -->
    <rect x="199" y="154" width="2" height="6" rx="0.5" fill="url(#realGold)" />
    <!-- 9 -->
    <rect x="160" y="119" width="6" height="2" rx="0.5" fill="url(#realGold)" />

    <!-- Small ticks for other hours -->
    <circle cx="217" cy="89" r="1" fill="#AA7C11" />
    <circle cx="231" cy="103" r="1" fill="#AA7C11" />
    <circle cx="231" cy="137" r="1" fill="#AA7C11" />
    <circle cx="217" cy="151" r="1" fill="#AA7C11" />
    <circle cx="183" cy="151" r="1" fill="#AA7C11" />
    <circle cx="169" cy="137" r="1" fill="#AA7C11" />
    <circle cx="169" cy="103" r="1" fill="#AA7C11" />
    <circle cx="183" cy="89" r="1" fill="#AA7C11" />

    <!-- Watch Hands -->
    <!-- Hour Hand (Golden) -->
    <g transform="rotate(40, 200, 120)">
      <path d="M 200,120 L 200,96" stroke="url(#realGold)" stroke-width="2.5" stroke-linecap="round" />
    </g>
    <!-- Minute Hand (Golden, Sleek) -->
    <g transform="rotate(160, 200, 120)">
      <path d="M 200,120 L 200,82" stroke="url(#realGold)" stroke-width="1.8" stroke-linecap="round" />
    </g>
    
    <!-- Center Pin -->
    <circle cx="200" cy="120" r="3.5" fill="url(#realGold)" />
    <circle cx="200" cy="120" r="1.5" fill="#5A3F02" />

    <!-- Crown (Adjustment knob) -->
    <path d="M 254,115 L 257,116 L 257,124 L 254,125 Z" fill="url(#realGold)" />
  </g>

  <!-- Glass shine overlay -->
  <path d="M 160,100 C 170,80 195,74 220,85 C 235,92 242,105 244,120 C 235,100 215,90 185,95 C 168,98 162,105 160,100 Z" fill="#FFFFFF" opacity="0.35" pointer-events="none" />
</svg>
