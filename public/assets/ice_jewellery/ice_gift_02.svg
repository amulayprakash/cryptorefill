<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- Background studio glow -->
    <radialGradient id="studioGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FAF7F2" />
      <stop offset="100%" stop-color="#E2D9CB" />
    </radialGradient>

    <!-- Card Background Gradient: Ultra Premium Matte Black / Dark Gold -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E2A24" />  <!-- Dark warm grey-gold -->
      <stop offset="45%" stop-color="#1A1713" /> <!-- Very dark charcoal -->
      <stop offset="100%" stop-color="#0B0907" /> <!-- Rich jet black -->
    </linearGradient>

    <!-- Heavy Gold Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3D4" />
      <stop offset="35%" stop-color="#E1B852" />
      <stop offset="70%" stop-color="#C59B27" />
      <stop offset="100%" stop-color="#7E5F0E" />
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E7" />
      <stop offset="100%" stop-color="#E1B852" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#1A1713" flood-opacity="0.25" />
    </filter>
    
    <!-- Chip Gradient -->
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF1D0" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#917217" />
    </linearGradient>
  </defs>

  <!-- Studio Background -->
  <rect width="400" height="250" fill="url(#studioGlow)" />

  <!-- Shadow under card -->
  <rect x="52" y="42" width="296" height="176" rx="14" fill="#000000" opacity="0.1" filter="blur(7px)" />

  <!-- Card Body -->
  <rect x="50" y="40" width="300" height="170" rx="14" fill="url(#cardBg)" stroke="url(#goldGrad)" stroke-width="1.8" filter="url(#cardShadow)" />

  <!-- Elegant Geometric Luxury Facet Lines (Top & Bottom) -->
  <path d="M 50,40 L 140,40 L 100,100 L 50,70 Z" fill="url(#goldGrad)" opacity="0.08" />
  <path d="M 350,210 L 260,210 L 300,150 L 350,180 Z" fill="url(#goldGrad)" opacity="0.08" />
  <line x1="50" y1="90" x2="110" y2="40" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.2" />
  <line x1="290" y1="210" x2="350" y2="160" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.2" />
  
  <path d="M 50,140 Q 150,180 250,110 T 350,150" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.12" />

  <!-- Diamond Logo Icon (Top-Left) -->
  <g transform="translate(72, 58)">
    <polygon points="12,0 24,10 12,24 0,10" fill="url(#goldGrad)" />
    <polygon points="12,0 12,24 24,10" fill="rgba(255, 255, 255, 0.25)" />
    <polygon points="12,0 0,10 12,10" fill="rgba(255, 255, 255, 0.35)" />
    <polygon points="12,24 12,10 24,10" fill="rgba(0, 0, 0, 0.2)" />
  </g>

  <!-- Brand Name (Top-Left, beside logo) -->
  <text x="106" y="70" font-family="'Cormorant Garamond', 'Playfair Display', serif" font-size="11" font-weight="700" fill="url(#goldText)" letter-spacing="2">ICE JEWELLERY</text>
  <text x="106" y="80" font-family="'Inter', sans-serif" font-size="5.5" font-weight="800" fill="url(#goldGrad)" letter-spacing="1.5">VIP BLACK EDITION</text>

  <!-- Chip (Left-Middle) -->
  <rect x="72" y="105" width="28" height="20" rx="4" fill="url(#chipGrad)" />
  <line x1="72" y1="115" x2="100" y2="115" stroke="#3D2B03" stroke-width="0.5" opacity="0.5" />
  <line x1="86" y1="105" x2="86" y2="125" stroke="#3D2B03" stroke-width="0.5" opacity="0.5" />
  <rect x="79" y="109" width="14" height="12" rx="2" fill="none" stroke="#3D2B03" stroke-width="0.5" opacity="0.5" />

  <!-- Card Details / Text (Bottom-Left) -->
  <text x="72" y="180" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#A8A29E" letter-spacing="1">CARD NUMBER</text>
  <text x="72" y="192" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#FBF9F6" letter-spacing="1.5">ICE-8840-250D-9981</text>

  <!-- Price / Value Display (Bottom-Right/Middle-Right) -->
  <text x="325" y="185" font-family="'Cormorant Garamond', 'Playfair Display', serif" font-size="34" font-weight="300" fill="url(#goldText)" text-anchor="end">$250</text>
  <text x="325" y="197" font-family="'Inter', sans-serif" font-size="6" font-weight="800" fill="url(#goldGrad)" letter-spacing="1.5" text-anchor="end">USD VALUE</text>

  <!-- Secure Hologram Circle (Top-Right) -->
  <circle cx="318" cy="72" r="12" fill="url(#goldGrad)" opacity="0.2" />
  <circle cx="318" cy="72" r="8" fill="url(#goldGrad)" opacity="0.35" />
  <path d="M 312,72 L 324,72 M 318,66 L 318,78" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.5" />

  <!-- Diagonal Gloss Reflection / Glass effect -->
  <path d="M 140,40 L 210,40 L 70,180 L 70,110 Z" fill="#FFFFFF" opacity="0.04" />
  <path d="M 250,40 L 310,40 L 140,210 L 80,210 Z" fill="#FFFFFF" opacity="0.07" />
</svg>
