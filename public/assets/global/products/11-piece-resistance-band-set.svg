<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="neonYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
    <linearGradient id="neonRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f87171" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid lines for sporty feel -->
  <line x1="50" y1="0" x2="50" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="150" y1="0" x2="150" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="250" y1="0" x2="250" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="350" y1="0" x2="350" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="450" y1="0" x2="450" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="0" y1="100" x2="500" y2="100" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="0" y1="200" x2="500" y2="200" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <line x1="0" y1="300" x2="500" y2="300" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  
  <!-- Ambient glows -->
  <circle cx="250" cy="200" r="120" fill="#06b6d4" opacity="0.08" filter="url(#glow)" />
  
  <!-- Coiled Bands -->
  <!-- Cyan Band -->
  <path d="M 120 230 C 180 130, 320 130, 380 230" fill="none" stroke="url(#neonCyan)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  <!-- Red Band -->
  <path d="M 110 245 C 170 145, 330 145, 390 245" fill="none" stroke="url(#neonRed)" stroke-width="8" stroke-linecap="round" />
  <!-- Yellow Band -->
  <path d="M 130 215 C 190 115, 310 115, 370 215" fill="none" stroke="url(#neonYellow)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Carabiners (Steel Hooks) -->
  <g transform="translate(100, 220) rotate(-45)">
    <rect width="12" height="30" rx="6" fill="#9ca3af" stroke="#4b5563" stroke-width="2" />
    <path d="M 0 10 L 12 10" stroke="#374151" stroke-width="2" />
  </g>
  <g transform="translate(380, 220) rotate(45)">
    <rect width="12" height="30" rx="6" fill="#9ca3af" stroke="#4b5563" stroke-width="2" />
    <path d="M 0 10 L 12 10" stroke="#374151" stroke-width="2" />
  </g>
  
  <!-- Handles -->
  <g transform="translate(50, 230)">
    <!-- D-ring -->
    <path d="M 30 10 Q 50 15 50 35 Q 50 55 30 60" fill="none" stroke="#6b7280" stroke-width="4" />
    <!-- Straps -->
    <rect x="0" y="20" width="35" height="8" fill="#111827" />
    <rect x="0" y="42" width="35" height="8" fill="#111827" />
    <!-- Grip Foam Handle -->
    <rect x="-10" y="10" width="16" height="50" rx="5" fill="#1f2937" stroke="#111827" stroke-width="3" />
  </g>
  <g transform="translate(410, 230) scale(-1, 1)">
    <!-- D-ring -->
    <path d="M 30 10 Q 50 15 50 35 Q 50 55 30 60" fill="none" stroke="#6b7280" stroke-width="4" />
    <!-- Straps -->
    <rect x="0" y="20" width="35" height="8" fill="#111827" />
    <rect x="0" y="42" width="35" height="8" fill="#111827" />
    <!-- Grip Foam Handle -->
    <rect x="-10" y="10" width="16" height="50" rx="5" fill="#1f2937" stroke="#111827" stroke-width="3" />
  </g>
  
  <!-- Title / Product text inside card overlay style -->
  <rect x="150" y="320" width="200" height="40" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="250" y="345" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#ffffff" letter-spacing="1.5" text-anchor="middle">11-PIECE RESISTANCE SET</text>
</svg>
