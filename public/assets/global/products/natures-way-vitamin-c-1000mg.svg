<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="30%" stop-color="#047857" />
      <stop offset="70%" stop-color="#065f46" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" opacity="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Warm glow in center -->
  <circle cx="250" cy="200" r="140" fill="#fff" opacity="0.15" filter="url(#glow)" />
  
  <!-- Orange Slices / Foliage Silhouette in background -->
  <path d="M 460 300 A 60 60 0 0 1 400 360 L 400 300 Z" fill="rgba(255,255,255,0.08)" />
  <circle cx="60" cy="80" r="40" fill="rgba(255,255,255,0.06)" />
  
  <!-- Bottle Shadow -->
  <ellipse cx="250" cy="335" rx="65" ry="9" fill="rgba(0,0,0,0.5)" />
  
  <!-- Bottle Body (Dark Green Nature's Way style bottle) -->
  <rect x="195" y="105" width="110" height="210" rx="20" fill="url(#bottleGrad)" />
  
  <!-- Cap (White Cap) -->
  <rect x="205" y="75" width="90" height="30" rx="6" fill="#f8fafc" />
  <rect x="205" y="90" width="90" height="15" fill="#f1f5f9" />
  
  <!-- Label -->
  <rect x="200" y="145" width="100" height="140" fill="#ffffff" rx="4" />
  <rect x="200" y="145" width="100" height="24" fill="#15803d" />
  
  <!-- Label Brand Name -->
  <text x="250" y="156" font-family="'Inter', sans-serif" font-size="7.5" font-weight="900" fill="#ffffff" letter-spacing="1" text-anchor="middle">NATURE'S WAY</text>
  <text x="250" y="165" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#fef08a" letter-spacing="0.5" text-anchor="middle">SUPERIOR QUALITY</text>
  
  <!-- Vitamin C text -->
  <text x="250" y="188" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#c2410c" text-anchor="middle">VITAMIN C</text>
  <text x="250" y="200" font-family="'Inter', sans-serif" font-size="8" font-weight="800" fill="#ea580c" text-anchor="middle">1000 mg</text>
  
  <!-- Orange Slice Icon on Label -->
  <g transform="translate(235, 206)">
    <circle cx="15" cy="15" r="13" fill="url(#orangeGrad)" />
    <circle cx="15" cy="15" r="11" fill="#ffffff" stroke="url(#orangeGrad)" stroke-width="1.5" />
    <line x1="15" y1="4" x2="15" y2="26" stroke="#ffffff" stroke-width="1" />
    <line x1="4" y1="15" x2="26" y2="15" stroke="#ffffff" stroke-width="1" />
    <line x1="7" y1="7" x2="23" y2="23" stroke="#ffffff" stroke-width="1" />
    <line x1="7" y1="23" x2="23" y2="7" stroke="#ffffff" stroke-width="1" />
  </g>
  
  <!-- Label Subtext -->
  <text x="250" y="258" font-family="'Inter', sans-serif" font-size="5.5" font-weight="800" fill="#15803d" text-anchor="middle">IMMUNE SUPPORT</text>
  <text x="250" y="268" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#64748b" text-anchor="middle">300 TABLETS</text>
  
  <!-- Sparkling fresh lights / bubbles -->
  <circle cx="340" cy="160" r="12" fill="#fb923c" opacity="0.6" filter="url(#glow)" />
  <text x="335" y="165" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">C</text>
  <circle cx="150" cy="220" r="8" fill="#eab308" opacity="0.4" filter="url(#glow)" />
</svg>
