<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#831843" />
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="30%" stop-color="#f43f5e" />
      <stop offset="70%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Ambient Glow -->
  <circle cx="250" cy="200" r="150" fill="#f43f5e" opacity="0.15" filter="url(#glow)" />
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" />
  <circle cx="420" cy="300" r="120" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="4" />
  
  <!-- Tablet Pills -->
  <g transform="translate(180, 290) rotate(-15)">
    <rect width="40" height="20" rx="10" fill="#fecdd3" opacity="0.9" />
    <line x1="20" y1="2" x2="20" y2="18" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
  <g transform="translate(290, 280) rotate(25)">
    <rect width="40" height="20" rx="10" fill="#fecdd3" opacity="0.9" />
    <line x1="20" y1="2" x2="20" y2="18" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
  
  <!-- Bottle Shadow -->
  <ellipse cx="250" cy="325" rx="75" ry="12" fill="rgba(0,0,0,0.4)" />
  
  <!-- Bottle Body -->
  <rect x="185" y="110" width="130" height="190" rx="25" fill="url(#bottleGrad)" />
  <!-- Glass Reflection -->
  <path d="M 200 120 Q 215 130 215 280 Q 200 290 200 280 Z" fill="rgba(255,255,255,0.15)" />
  
  <!-- Cap -->
  <rect x="205" y="80" width="90" height="30" rx="6" fill="url(#capGrad)" />
  <rect x="210" y="75" width="80" height="5" rx="2" fill="#fef08a" />
  
  <!-- Bottle Label -->
  <rect x="195" y="150" width="110" height="120" rx="10" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  
  <!-- Brand text -->
  <text x="250" y="175" font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#fcd34d" letter-spacing="3" text-anchor="middle">SHISEIDO</text>
  <text x="250" y="205" font-family="'Inter', sans-serif" font-size="18" font-weight="900" fill="url(#goldText)" letter-spacing="1" text-anchor="middle">THE COLLAGEN</text>
  <text x="250" y="225" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" text-anchor="middle">EXR</text>
  
  <!-- Active / Beauty Dots -->
  <circle cx="225" cy="250" r="3" fill="#f59e0b" />
  <circle cx="250" cy="250" r="3" fill="#f59e0b" />
  <circle cx="275" cy="250" r="3" fill="#f59e0b" />
  
  <!-- Sparkling Star -->
  <path d="M 330 90 L 333 100 L 343 103 L 333 106 L 330 116 L 327 106 L 317 103 L 327 100 Z" fill="#fcd34d" />
  <path d="M 150 250 L 152 255 L 157 257 L 152 259 L 150 264 L 148 259 L 143 257 L 148 255 Z" fill="#fcd34d" />
</svg>
