<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="redBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="blackBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="purpleBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Sport Grid details -->
  <circle cx="250" cy="180" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="2" />
  <circle cx="250" cy="180" r="100" fill="none" stroke="rgba(255,255,255,0.01)" stroke-width="1" />
  
  <!-- Red glow in background -->
  <circle cx="250" cy="180" r="90" fill="#ef4444" opacity="0.08" filter="url(#glow)" />
  
  <!-- Pull-Up Assist Heavy Duty Bands (hollow thick rings/loops style) -->
  
  <!-- Purple Band (Medium/Heavy) -->
  <path d="M 200 80 Q 250 40 300 80 L 320 280 Q 250 320 180 280 Z" fill="none" stroke="url(#purpleBand)" stroke-width="32" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Black Band (Heavy) -->
  <path d="M 230 90 Q 250 60 270 90 L 290 270 Q 250 300 210 270 Z" fill="none" stroke="url(#blackBand)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Red Band (Light) -->
  <path d="M 170 100 Q 250 60 330 100 L 350 260 Q 250 300 150 260 Z" fill="none" stroke="url(#redBand)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Band Labels / Markings -->
  <g transform="translate(250, 180)">
    <text x="-55" y="10" font-family="'Inter', sans-serif" font-size="9" font-weight="900" fill="#ffffff" opacity="0.9" rotate="-80">15-35 LBS</text>
    <text x="5" y="0" font-family="'Inter', sans-serif" font-size="11" font-weight="900" fill="#ffffff" opacity="0.9" rotate="-85">40-80 LBS</text>
  </g>
  
  <!-- Hanging Pull-up bar segment silhouette at top -->
  <rect x="100" y="30" width="300" height="15" rx="7" fill="#374151" stroke="#1f2937" stroke-width="2" />
  <rect x="150" y="25" width="20" height="5" fill="#4b5563" />
  <rect x="330" y="25" width="20" height="5" fill="#4b5563" />
  
  <!-- Bottom Text label -->
  <rect x="140" y="330" width="220" height="35" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="250" y="352" font-family="'Inter', sans-serif" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="2" text-anchor="middle">PULL-UP ASSIST BANDS</text>
</svg>
