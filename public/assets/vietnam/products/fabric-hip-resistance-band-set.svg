<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="bandPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4e6" />
      <stop offset="100%" stop-color="#fecdd3" />
    </linearGradient>
    <linearGradient id="bandRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="bandGrey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)" />
  
  <!-- Elegant soft background circle -->
  <circle cx="250" cy="200" r="130" fill="#fff" opacity="0.15" filter="url(#glow)" />
  
  <!-- Flat shadow for the bands stack -->
  <ellipse cx="250" cy="300" rx="140" ry="25" fill="rgba(0,0,0,0.15)" />
  
  <!-- Stack of Fabric Bands -->
  
  <!-- Bottom Band (Dark Grey/Black Band) -->
  <g transform="translate(110, 210) rotate(-5)">
    <rect width="280" height="70" rx="14" fill="url(#bandGrey)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    <!-- Textured stripes inside fabric -->
    <line x1="30" y1="0" x2="30" y2="70" stroke="#374151" stroke-width="15" stroke-dasharray="4 4" />
    <line x1="250" y1="0" x2="250" y2="70" stroke="#374151" stroke-width="15" stroke-dasharray="4 4" />
    <!-- Brand badge on band -->
    <rect x="110" y="20" width="60" height="30" rx="4" fill="#111827" />
    <text x="140" y="38" font-family="'Inter', sans-serif" font-size="7" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">HEAVY</text>
  </g>
  
  <!-- Middle Band (Rose/Pink Band) -->
  <g transform="translate(100, 160) rotate(2)">
    <rect width="280" height="70" rx="14" fill="url(#bandRose)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <!-- Textured stripes inside fabric -->
    <line x1="40" y1="0" x2="40" y2="70" stroke="#be123c" stroke-width="15" stroke-dasharray="4 4" />
    <line x1="240" y1="0" x2="240" y2="70" stroke="#be123c" stroke-width="15" stroke-dasharray="4 4" />
    <!-- Brand badge on band -->
    <rect x="110" y="20" width="60" height="30" rx="4" fill="#9f1239" />
    <text x="140" y="38" font-family="'Inter', sans-serif" font-size="7" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">MEDIUM</text>
  </g>
  
  <!-- Top Band (Light Pink Band) -->
  <g transform="translate(115, 110) rotate(-3)">
    <rect width="280" height="70" rx="14" fill="url(#bandPink)" stroke="#ffffff" stroke-width="1.5" />
    <!-- Textured stripes inside fabric -->
    <line x1="30" y1="0" x2="30" y2="70" stroke="#fda4af" stroke-width="15" stroke-dasharray="4 4" />
    <line x1="250" y1="0" x2="250" y2="70" stroke="#fda4af" stroke-width="15" stroke-dasharray="4 4" />
    <!-- Brand badge on band -->
    <rect x="110" y="20" width="60" height="30" rx="4" fill="#ffffff" stroke="#e11d48" stroke-width="1" />
    <text x="140" y="38" font-family="'Inter', sans-serif" font-size="7" font-weight="900" fill="#e11d48" text-anchor="middle" letter-spacing="1">LIGHT</text>
  </g>
  
  <!-- Overlay Title -->
  <text x="250" y="360" font-family="'Inter', sans-serif" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="2" text-anchor="middle">FABRIC HIP BAND SET</text>
</svg>
